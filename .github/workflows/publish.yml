name: Publicar Libro Digital

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (poppler para pdf2image)
        run: sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: |
          pip install \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            pdf2image \
            pillow

      - name: Convert & generate book
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FILE_ID:               ${{ secrets.DRIVE_FILE_ID }}
          BOOK_TITLE:                  ${{ secrets.BOOK_TITLE }}
          BOOK_SUBTITLE:               ${{ secrets.BOOK_SUBTITLE }}
        run: python convert.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          commit_message: "📚 Libro actualizado automáticamente"
